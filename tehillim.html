<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Keter YG';
  src: url('https://cdn.jsdelivr.net/gh/unicode-cookbook/fonts@main/KeterYG/KeterYG.woff2') format('woff2');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'Taamey Frank CLM';
  src: url('https://cdn.jsdelivr.net/gh/unicode-cookbook/fonts@main/TaameyFrankCLM/TaameyFrankCLM.woff2') format('woff2');
  font-weight: normal; font-style: normal;
}
</style>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>תהילים אישיים</title>
<style>
:root{
  --blue:#1B3A5C;--gold:#C9A84C;--gold-light:#F0D98A;
  --bg:#ffffff;--bg2:#f8f8f5;--border:#e0ddd5;
  --text:#1a1208;--text2:#555;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Keter YG','Frank Ruhl Libre',David,Arial,serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
/* NAV */
nav{background:var(--blue);color:white;padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
nav .logo{font-size:1.1rem;font-weight:700;color:var(--gold-light)}
nav .nav-links{display:flex;gap:.5rem}
nav .nav-links button{background:none;border:1px solid rgba(255,255,255,.3);color:white;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.82rem;font-family:inherit}
nav .nav-links button.active,nav .nav-links button:hover{background:var(--gold);color:var(--blue);border-color:var(--gold)}
/* SECTIONS */
.section{display:none;padding:1rem;max-width:860px;margin:0 auto}
.section.active{display:block}
/* SEARCH */
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem}
.search-box h2{font-size:1rem;color:var(--blue);margin-bottom:.8rem}
.date-inputs{display:flex;gap:.5rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:.7rem}
.date-inputs .field{display:flex;flex-direction:column;gap:3px}
.date-inputs label{font-size:.75rem;color:var(--text2)}
.date-inputs input,.date-inputs select{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:.9rem;font-family:inherit;background:white}
.date-inputs input[type=number]{width:80px}
.date-inputs select{min-width:100px}
.date-tabs{display:flex;gap:.4rem;margin-bottom:.8rem}
.date-tab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.8rem;background:white;font-family:inherit}
.date-tab.active{background:var(--blue);color:white;border-color:var(--blue)}
.date-row{display:none}.date-row.active{display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end}
.btn-primary{padding:9px 20px;background:var(--blue);color:white;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-family:inherit;font-weight:600}
.btn-primary:hover{background:#2A5A8C}
.btn-gold{padding:9px 20px;background:var(--gold);color:var(--blue);border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-family:inherit;font-weight:700}
.btn-gold:hover{background:var(--gold-light)}
/* RESULT BOX */
.result-box{background:var(--bg2);border:2px solid var(--gold);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem}
.result-box .main-msg{font-size:1.3rem;font-weight:700;color:var(--blue);margin-bottom:.5rem;line-height:1.6}
.result-box .sub-msg{font-size:.9rem;color:var(--text2);margin-bottom:.8rem}
.alert-box{background:#FFF8E0;border:1px solid var(--gold);border-radius:7px;padding:.6rem 1rem;font-size:.88rem;color:#7a5a00;margin-bottom:.8rem}
.action-btns{display:flex;gap:.6rem;flex-wrap:wrap}
.btn-outline{padding:7px 16px;border:1px solid var(--blue);color:var(--blue);background:white;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit}
.btn-outline:hover{background:var(--blue);color:white}
/* TABLE */
.study-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.8rem}
.study-table th{background:var(--blue);color:white;padding:6px 10px;text-align:right}
.study-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.study-table tr.cur{background:#FFF8E8;font-weight:700}
.study-table tr.cur td{border-color:var(--gold)}
.study-table .read-btn{padding:3px 9px;background:var(--gold);color:var(--blue);border:none;border-radius:4px;cursor:pointer;font-size:.75rem;font-family:inherit;font-weight:700}
/* PERSONAL */
.personal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.personal-header h2{font-size:1rem;color:var(--blue)}
.chapter-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;margin-bottom:.7rem;position:relative}
.chapter-card .ch-name{font-size:1rem;font-weight:700;color:var(--blue);margin-bottom:.3rem}
.chapter-card .ch-meta{font-size:.78rem;color:var(--text2);margin-bottom:.6rem;line-height:1.6}
.chapter-card .ch-actions{display:flex;gap:.4rem;flex-wrap:wrap}
.chapter-card .ch-actions button{padding:4px 11px;font-size:.75rem;border-radius:4px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:white}
.chapter-card .ch-actions button:hover{background:var(--blue);color:white;border-color:var(--blue)}
.chapter-card .drag-handle{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);cursor:grab;color:#ccc;font-size:1.2rem;user-select:none}
.chapter-card.dragging{opacity:.5;border:2px dashed var(--gold)}
.chapter-card.drag-over{border-top:3px solid var(--gold)}
.add-form{background:#f0f4ff;border:1px solid #b0c0e0;border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.add-form h3{font-size:.9rem;color:var(--blue);margin-bottom:.7rem}
.add-form .form-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:.5rem}
.add-form input,.add-form select{padding:6px 9px;border:1px solid #ccc;border-radius:5px;font-size:.85rem;font-family:inherit}
.add-form input[type=text]{min-width:130px}
.add-form .form-label{font-size:.75rem;color:var(--text2);display:block;margin-bottom:2px}
/* VIEWER */
.viewer-wrap{margin-top:.8rem}
.pasuk-block{border-right:3px solid var(--gold);padding:.6rem .8rem;margin-bottom:.9rem;background:#fafaf8;border-radius:0 6px 6px 0}
.pasuk-num{font-size:.7em;color:var(--gold);font-weight:700;margin-bottom:.2rem}
.pasuk-text{font-size:1.05em;line-height:1.9;color:var(--text);margin-bottom:.4rem;font-weight:700}
.comm-item{margin-bottom:.3rem;padding:.35rem .6rem;border-radius:4px}
.comm-item.rashi{background:#f0f4ff}.comm-item.metzudot{background:#f0fff4}
.comm-item.radak{background:#fff8f0}.comm-item.ibnezra{background:#fdf0ff}
.comm-label{font-size:.68em;font-weight:700;margin-bottom:2px}
.comm-label.rashi{color:#2244aa}.comm-label.metzudot{color:#227744}
.comm-label.radak{color:#aa6622}.comm-label.ibnezra{color:#882299}
.comm-text{font-size:.85em;line-height:1.7;color:#333}
.toggle-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem;align-items:center}
.tog-btn{padding:4px 11px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:.75rem;background:white;font-family:inherit}
.tog-btn.on{background:var(--blue);color:white;border-color:var(--blue)}
.viewer-loading{padding:1.5rem;text-align:center;color:var(--text2);font-style:italic}
/* SHARE */
.share-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
.share-link{font-size:.72rem;color:#888;direction:ltr;word-break:break-all;text-align:left;flex:1}
.copy-btn{padding:3px 9px;font-size:.72rem;background:#f0f0f0;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-family:inherit}
/* FONT CONTROLS */
.font-controls{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.7rem;padding:.5rem .7rem;background:#f5f5f0;border-radius:7px;border:1px solid var(--border)}
.font-controls .fc-label{font-size:.72rem;color:var(--text2);white-space:nowrap}
.font-size-btn{width:28px;height:28px;border:1px solid var(--border);background:white;border-radius:5px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0}
.font-size-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
.font-select{padding:4px 8px;border:1px solid #ccc;border-radius:5px;font-size:.78rem;font-family:inherit;background:white}
/* CHAPTER COMMENTARY */
.chapter-comm-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem;padding:.6rem;background:#faf8f0;border:1px solid #e8d99a;border-radius:8px}
.ch-comm-btn{padding:5px 12px;border:1px solid #c9a84c;background:white;color:#7a5a00;border-radius:15px;cursor:pointer;font-size:.78rem;font-family:inherit;font-weight:600;transition:all .15s}
.ch-comm-btn:hover,.ch-comm-btn.on{background:var(--gold);color:var(--blue);border-color:var(--gold)}
.chapter-comm-block{background:#fffdf0;border:1px solid #e8d99a;border-radius:8px;padding:.9rem 1rem;margin-bottom:1rem}
.chapter-comm-block .comm-title{font-size:.8rem;font-weight:700;color:#7a5a00;margin-bottom:.5rem;border-bottom:1px solid #e8d99a;padding-bottom:.4rem}
.chapter-comm-block .comm-body{font-size:.92em;line-height:1.9;color:var(--text)}
.chapter-comm-block .comm-sources{font-size:.72em;color:#999;margin-top:.5rem;font-style:italic}
/* PRIMARY / SECONDARY ACTIONS */
.ch-actions-primary{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.4rem}
.ch-actions-secondary{display:flex;gap:.3rem;flex-wrap:wrap}
.ch-actions-secondary button{padding:3px 9px;font-size:.72rem;border-radius:4px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:#f8f8f8;color:#666}
.ch-actions-secondary button:hover{background:#eee}
.ch-actions-secondary button.del-btn:hover{background:#fff0f0;color:#c00;border-color:#fcc}
.btn-primary-action{padding:7px 16px;background:var(--blue);color:white;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:600}
.btn-primary-action:hover{background:#2A5A8C}
.btn-secondary-action{padding:7px 16px;background:white;color:var(--blue);border:1px solid var(--blue);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:600}
.btn-secondary-action:hover{background:var(--blue);color:white}
/* METZUDOT SPLIT */
.comm-item.metzudot-david{background:#f0fff4}.comm-item.metzudot-zion{background:#e8faf0}
.comm-label.metzudot-david{color:#227744}.comm-label.metzudot-zion{color:#1a6635}
/* COLLAPSIBLE */
.collapse-wrap{margin-top:.6rem}
.collapse-btn{width:100%;text-align:right;padding:7px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;color:var(--blue);font-family:inherit;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.collapse-btn:hover{background:#eee}
.collapse-content{display:none;padding-top:.5rem}
.collapse-content.open{display:block}
/* MISC */
.loading{padding:1.5rem;text-align:center;color:var(--text2);font-style:italic}
.err{background:#fff0f0;border:1px solid #fcc;border-radius:6px;padding:.7rem;color:#c00;margin:.5rem 0}
hr{border:none;border-top:1px solid var(--border);margin:.8rem 0}
.small{font-size:.78rem;color:var(--text2)}
.tag{display:inline-block;background:var(--gold);color:var(--blue);border-radius:10px;padding:1px 8px;font-size:.72rem;font-weight:700;margin-right:4px}
</style>
</head>
<body>

<nav>
  <div class="logo">&#x2726; תהילים אישיים</div>
  <div class="nav-links">
    <button id="nav-search" class="active" onclick="showSection('search')">&#x1F50D; חיפוש</button>
    <button id="nav-personal" onclick="showSection('personal')">&#x1F464; הפרקים שלי</button>
    <button onclick="window.open('print.html','_blank')">&#x1F5A8; הדפסה</button>
  </div>
</nav>

<!-- SEARCH SECTION -->
<div id="sec-search" class="section active">
  <div class="search-box">
    <h2>הזן תאריך לידה</h2>
    <div class="date-tabs">
      <button class="date-tab active" onclick="switchDateType('greg')">לועזי</button>
      <button class="date-tab" onclick="switchDateType('heb')">עברי</button>
    </div>
    <div id="row-greg" class="date-row active">
      <div class="field"><label>תאריך</label><input type="date" id="greg-date" value=""></div>
    </div>
    <div id="row-heb" class="date-row">
      <div class="field"><label>יום</label>
        <select id="heb-day" style="width:70px">
          <option value="1">א׳</option><option value="2">ב׳</option><option value="3">ג׳</option><option value="4">ד׳</option><option value="5">ה׳</option>
          <option value="6">ו׳</option><option value="7">ז׳</option><option value="8">ח׳</option><option value="9">ט׳</option><option value="10">י׳</option>
          <option value="11">י״א</option><option value="12">י״ב</option><option value="13">י״ג</option><option value="14">י״ד</option><option value="15">ט״ו</option>
          <option value="16">ט״ז</option><option value="17">י״ז</option><option value="18">י״ח</option><option value="19">י״ט</option><option value="20">כ׳</option>
          <option value="21">כ״א</option><option value="22">כ״ב</option><option value="23">כ״ג</option><option value="24">כ״ד</option><option value="25">כ״ה</option>
          <option value="26">כ״ו</option><option value="27">כ״ז</option><option value="28">כ״ח</option><option value="29">כ״ט</option><option value="30">ל׳</option>
        </select>
      </div>
      <div class="field"><label>חודש</label>
        <select id="heb-month">
          <option value="Tishrei">תשרי</option><option value="Cheshvan">חשון</option>
          <option value="Kislev">כסלו</option><option value="Tevet">טבת</option>
          <option value="Sh'vat">שבט</option><option value="Adar">אדר</option>
          <option value="Adar I">אדר א׳</option><option value="Adar II">אדר ב׳</option>
          <option value="Nisan">ניסן</option><option value="Iyar">אייר</option>
          <option value="Sivan">סיון</option><option value="Tamuz">תמוז</option>
          <option value="Av">אב</option><option value="Elul">אלול</option>
        </select>
      </div>
      <div class="field"><label>שנה</label>
        <div style="display:flex;gap:.3rem;align-items:center">
          <input type="number" id="heb-year" placeholder="שנה" min="5000" max="6000" style="width:80px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:.9rem;font-family:inherit">
          <span id="heb-year-letters" style="font-size:.8rem;color:var(--blue);min-width:40px"></span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.7rem;align-items:center">
      <button class="btn-primary" onclick="doSearch()">&#x2190; חשב</button>
      <div class="small" id="search-status"></div>
    </div>
  </div>
  <div id="search-result"></div>
</div>

<!-- PERSONAL SECTION -->
<div id="sec-personal" class="section">
  <div class="personal-header">
    <h2>&#x1F464; הפרקים שלי</h2>
    <div style="display:flex;gap:.4rem;flex-wrap:wrap">
      <button class="btn-gold" onclick="toggleAddForm()">+ הוסף פרק</button>
      <button class="btn-outline" onclick="addRabbi()">&#x2726; הוסף הרבי</button>
    </div>
  </div>

  <div class="add-form" id="add-form" style="display:none">
    <h3>הוספת פרק חדש</h3>
    <div class="form-row">
      <div><span class="form-label">שם</span><input type="text" id="af-name" placeholder="שם האדם"></div>
      <div>
        <span class="form-label">סוג תאריך</span>
        <select id="af-dtype" onchange="toggleAddDateType()">
          <option value="greg">לועזי</option><option value="heb">עברי</option>
        </select>
      </div>
    </div>
    <div id="af-greg-row" class="form-row">
      <div><span class="form-label">תאריך לועזי</span><input type="date" id="af-greg" value="1990-01-01"></div>
    </div>
    <div id="af-heb-row" class="form-row" style="display:none">
      <div><span class="form-label">יום</span><input type="number" id="af-hd" min="1" max="30" value="1" style="width:65px"></div>
      <div><span class="form-label">חודש</span>
        <select id="af-hm">
          <option value="Tishrei">תשרי</option><option value="Cheshvan">חשון</option>
          <option value="Kislev">כסלו</option><option value="Tevet">טבת</option>
          <option value="Sh'vat">שבט</option><option value="Adar">אדר</option>
          <option value="Adar I">אדר א׳</option><option value="Adar II">אדר ב׳</option>
          <option value="Nisan">ניסן</option><option value="Iyar">אייר</option>
          <option value="Sivan">סיון</option><option value="Tamuz">תמוז</option>
          <option value="Av">אב</option><option value="Elul">אלול</option>
        </select>
      </div>
      <div><span class="form-label">שנה</span><input type="number" id="af-hy" value="5750" min="5000" max="6000" style="width:80px"></div>
    </div>
    <div class="form-row">
      <div style="display:flex;align-items:center;gap:.4rem">
        <input type="checkbox" id="af-alert" style="width:16px;height:16px">
        <label for="af-alert" style="font-size:.82rem">התראה ראש חודש <span style="color:#999;font-size:.75rem">(לא עובד עדיין)</span></label>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.3rem">
      <button class="btn-primary" onclick="saveChapter()">שמור</button>
      <button class="btn-outline" onclick="toggleAddForm()">ביטול</button>
    </div>
  </div>

  <div id="chapters-list"></div>
  <div id="personal-loading" class="loading" style="display:none">&#x23F3; טוען...</div>
</div>

<!-- EDIT MODAL -->
<div id="edit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem">
  <div style="background:white;max-width:420px;width:100%;border-radius:var(--radius);overflow:hidden">
    <div style="background:var(--blue);color:white;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:700;color:var(--gold-light)">עריכת פרק</div>
      <button onclick="closeEditModal()" style="background:none;border:none;color:white;font-size:1.3rem;cursor:pointer">&#x2715;</button>
    </div>
    <div id="viewer-panel" style="padding:1rem;font-family:'Keter YG','Frank Ruhl Libre',serif;font-size:16px">
      <div class="form-row" style="margin-bottom:.6rem">
        <div><span class="form-label">שם</span><input type="text" id="em-name" style="width:100%;padding:7px;border:1px solid #ccc;border-radius:5px;font-family:inherit"></div>
      </div>
      <div class="form-row" style="margin-bottom:.6rem">
        <div><span class="form-label">סוג תאריך</span>
          <select id="em-dtype" onchange="toggleEditDateType()" style="padding:6px;border:1px solid #ccc;border-radius:5px;font-family:inherit">
            <option value="greg">לועזי</option><option value="heb">עברי</option>
          </select>
        </div>
      </div>
      <div id="em-greg-row" class="form-row" style="margin-bottom:.6rem">
        <div><span class="form-label">תאריך לועזי</span><input type="date" id="em-greg" style="padding:6px;border:1px solid #ccc;border-radius:5px;font-family:inherit"></div>
      </div>
      <div id="em-heb-row" class="form-row" style="display:none;margin-bottom:.6rem;gap:.4rem">
        <div><span class="form-label">יום</span><input type="number" id="em-hd" min="1" max="30" style="width:60px;padding:6px;border:1px solid #ccc;border-radius:5px;font-family:inherit"></div>
        <div><span class="form-label">חודש</span>
          <select id="em-hm" style="padding:6px;border:1px solid #ccc;border-radius:5px;font-family:inherit">
            <option value="Tishrei">תשרי</option><option value="Cheshvan">חשון</option>
            <option value="Kislev">כסלו</option><option value="Tevet">טבת</option>
            <option value="Sh'vat">שבט</option><option value="Adar">אדר</option>
            <option value="Adar I">אדר א'</option><option value="Adar II">אדר ב'</option>
            <option value="Nisan">ניסן</option><option value="Iyar">אייר</option>
            <option value="Sivan">סיון</option><option value="Tamuz">תמוז</option>
            <option value="Av">אב</option><option value="Elul">אלול</option>
          </select>
        </div>
        <div><span class="form-label">שנה</span><input type="number" id="em-hy" min="5000" max="6000" style="width:75px;padding:6px;border:1px solid #ccc;border-radius:5px;font-family:inherit"></div>

function gem(n){
  if(n<=0)return String(n);
  var o=['','א','ב','ג','ד','ה','ו','ז','ח','ט'],t=['','י','כ','ל','מ','נ','ס','ע','פ','צ'],h=['','ק','ר','ש','ת'];
  var r='',rem=n,hh=Math.floor(rem/100);
  if(hh>=5){r+='\u05ea';rem-=400;hh=Math.floor(rem/100);}
  if(hh>0){r+=h[hh];rem-=hh*100;}
  if(rem===15){r+='\u05d8\u05d5';rem=0;}
  else if(rem===16){r+='\u05d8\u05d6';rem=0;}
  else{var tt=Math.floor(rem/10);if(tt>0){r+=t[tt];rem-=tt*10;}if(rem>0)r+=o[rem];}
  if(r.length===1)return r+'\u05f3';
  return r.slice(0,-1)+'\u05f4'+r.slice(-1);
}
function hYearStr(hy){return gem(hy%1000);}
var HM={
  'Tishrei':'\u05ea\u05e9\u05e8\u05d9','Cheshvan':'\u05d7\u05e9\u05d5\u05df','Kislev':'\u05db\u05e1\u05dc\u05d5',
  'Tevet':'\u05d8\u05d1\u05ea',"Sh'vat":'\u05e9\u05d1\u05d8','Shvat':'\u05e9\u05d1\u05d8',
  'Adar':'\u05d0\u05d3\u05e8','Adar I':'\u05d0\u05d3\u05e8 \u05d0\u05f3','Adar II':'\u05d0\u05d3\u05e8 \u05d1\u05f3',
  'Nisan':'\u05e0\u05d9\u05e1\u05df','Iyar':'\u05d0\u05d9\u05d9\u05e8','Sivan':'\u05e1\u05d9\u05d5\u05df',
  'Tamuz':'\u05ea\u05de\u05d5\u05d6','Av':'\u05d0\u05d1','Elul':'\u05d0\u05dc\u05d5\u05dc'
};
var MR=['Tishrei','Cheshvan','Kislev','Tevet',"Sh'vat",'Adar','Nisan','Iyar','Sivan','Tamuz','Av','Elul'];
var ML=['Tishrei','Cheshvan','Kislev','Tevet',"Sh'vat",'Adar I','Adar II','Nisan','Iyar','Sivan','Tamuz','Av','Elul'];
function hmn(api){return HM[api]||api;}
function isLeap(hy){return((7*hy+1)%19)<7;}
function normBM(bm,hy){
  if(bm==='Shvat')bm="Sh'vat";
  if(!isLeap(hy)){if(bm==='Adar I'||bm==='Adar II')return'Adar';return bm;}
  else{if(bm==='Adar')return'Adar II';return bm;}
}
function distributeVerses(V,M){
  var mult=1;while(V*mult<M)mult++;
  var tv=V*mult,base=Math.floor(tv/M),rem=tv%M,result=[],cur=0;
  for(var i=0;i<M;i++){
    var cnt=(i<rem)?(base+1):base,segs=[],left=cnt,pos=cur;
    while(left>0){var sp=V-pos,tk=Math.min(left,sp);segs.push([pos+1,pos+tk]);pos=(pos+tk)%V;left-=tk;}
    result.push(segs);cur=(cur+cnt)%V;
  }
  return result;
}
function fmtSegs(segs){
  var d=[],n=[];
  segs.forEach(function(s){d.push(s[0]===s[1]?gem(s[0]):gem(s[0])+'\u2013'+gem(s[1]));n.push(s[0]===s[1]?String(s[0]):s[0]+'-'+s[1]);});
  return{d:d.join(', '),n:n.join(', ')};
}

// ============================================================
// HEBCAL
// ============================================================
var hcC={};
async function g2h(d){
  var k='g'+d.toISOString().split('T')[0];if(hcC[k])return hcC[k];
  var y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
  var j=await(await fetch('https://www.hebcal.com/converter?v=1&cfg=json&gy='+y+'&gm='+m+'&gd='+dd+'&g2h=1')).json();
  hcC[k]=j;return j;
}
async function h2g(hy,hm,hd){
  var k='h'+hy+'-'+hm+'-'+hd;if(hcC[k])return hcC[k];
  var j=await(await fetch('https://www.hebcal.com/converter?v=1&cfg=json&hy='+hy+'&hm='+encodeURIComponent(hm)+'&hd='+hd+'&h2g=1')).json();
  if(j.error)return null;hcC[k]=j;return j;
}
async function hebDateFromInputs(day,month,year){
  // convert hebrew to gregorian then back to get canonical
  var g=await h2g(year,month,day);
  if(!g)return null;
  return{hd:day,hm:month,hy:year,gy:g.gy,gm:g.gm,gd:g.gd};
}

// ============================================================
// CORE CALC
// ============================================================
function buildStudyMonths(bm,bd,lastBY){
  var nextBY=lastBY+1,isRC=(bd===1);
  var bmL=normBM(bm,lastBY),bmN=normBM(bm,nextBY);
  var curY=lastBY,curList=isLeap(curY)?ML:MR;
  var si=curList.indexOf(bmL);if(si===-1)si=0;
  var ci=si+1;
  if(ci>=curList.length){curY++;curList=isLeap(curY)?ML:MR;ci=0;}
  var months=[];
  for(var i=0;i<14;i++){
    if(ci>=curList.length){curY++;curList=isLeap(curY)?ML:MR;ci=0;}
    var hm=curList[ci];
    if(curY===nextBY&&hm===bmN){if(!isRC)months.push({hy:curY,hm:hm,hmn:hmn(hm)});break;}
    if(curY>nextBY)break;
    months.push({hy:curY,hm:hm,hmn:hmn(hm)});ci++;
  }
  return months;
}
async function findIdx(months,ref){
  var idx=0;
  for(var i=0;i<months.length;i++){
    var g=await h2g(months[i].hy,months[i].hm,1);
    var d=g&&g.gy?new Date(g.gy,g.gm-1,g.gd):null;
    if(d&&d<=ref)idx=i;else break;
  }
  return idx;
}

async function calcForBirth(birthHM,birthHD,birthHY,refDate){
  if(!refDate)refDate=new Date();
  refDate=new Date(refDate);refDate.setHours(0,0,0,0);
  var refH=await g2h(refDate);
  var refHY=refH.hy;
  var bmt=normBM(birthHM,refHY);
  var bdThis=await h2g(refHY,bmt,birthHD);
  var bdG=bdThis&&bdThis.gy?new Date(bdThis.gy,bdThis.gm-1,bdThis.gd):null;
  var lastBY=bdG&&bdG<=refDate?refHY:refHY-1;
  var nextBY=lastBY+1;
  var bml=normBM(birthHM,lastBY);
  var bmn2=normBM(birthHM,nextBY);

  // age
  var bdGrig=await h2g(birthHY,birthHM,birthHD);
  var bdOrig=bdGrig?new Date(bdGrig.gy,bdGrig.gm-1,bdGrig.gd):null;
  var age=0;
  if(bdOrig){age=refDate.getFullYear()-bdOrig.getFullYear();var md=refDate.getMonth()-bdOrig.getMonth(),dd=refDate.getDate()-bdOrig.getDate();if(md<0||(md===0&&dd<0))age--;}

  var psalmAge=Math.min(age,149);
  var pd=PSALM_DATA[psalmAge];
  var months=buildStudyMonths(birthHM,birthHD,lastBY);
  var numM=months.length;
  var ranges=distributeVerses(pd.v,numM);
  var idx=await findIdx(months,refDate);

  // next birthday info
  var nbHG=await h2g(nextBY,bmn2,birthHD);
  var nbGreg=nbHG&&nbHG.gy?new Date(nbHG.gy,nbHG.gm-1,nbHG.gd):null;

  // days to next rosh chodesh (month idx+1)
  var nextMonthIdx=idx+1<months.length?idx+1:null;
  var nextRCGreg=null;
  if(nextMonthIdx!==null){
    var nrg=await h2g(months[nextMonthIdx].hy,months[nextMonthIdx].hm,1);
    nextRCGreg=nrg&&nrg.gy?new Date(nrg.gy,nrg.gm-1,nrg.gd):null;
  }
  var daysToRC=nextRCGreg?Math.round((nextRCGreg-refDate)/(1000*60*60*24)):null;

  return{pd,months,ranges,idx,numM,age,lastBY,nextBY,bml,bmn2,birthHD,birthHM,nbGreg,daysToRC,nextMonthIdx};
}

function daysToNextBD(nbGreg,refDate){
  if(!nbGreg)return null;
  return Math.round((nbGreg-refDate)/(1000*60*60*24));
}
function formatCountdown(days){
  if(days<=0)return 'היום!';
  if(days<7)return 'בעוד '+days+' ימים';
  if(days<30)return 'בעוד '+Math.round(days/7)+' שבועות';
  return 'בעוד '+Math.round(days/30)+' חודשים';
}

async function doSearch(){

      bd=parseInt(document.getElementById('heb-day').value);

    }
    if(bm==='Shvat')bm="Sh'vat";
    status.textContent='';
    await renderSearchResult(bm,bd,by,bdGreg);
  }catch(e){status.textContent='שגיאה: '+e.message;console.error(e);}

async function renderSearchResult(bm,bd,by,bdGreg){
  var res=document.getElementById('search-result');
  res.innerHTML='<div class="loading">&#x23F3; מחשב...</div>';
  var today=new Date();today.setHours(0,0,0,0);
  var c=await calcForBirth(bm,bd,by,today);
  var curSegs=c.ranges[c.idx];
  var fmt=fmtSegs(curSegs);
  var curMonth=c.months[c.idx];
  var vFrom=curSegs[0][0],vTo=curSegs[curSegs.length-1][1];

  // ראש חודש נוכחי
  var curRCg=await h2g(curMonth.hy,curMonth.hm,1);
  var curRCDate=curRCg?new Date(curRCg.gy,curRCg.gm-1,curRCg.gd):null;
  var daysSinceRC=curRCDate?Math.round((today-curRCDate)/(1000*60*60*24)):0;

  var alertHtml='';
  if(c.daysToRC!==null&&c.daysToRC>=0&&c.daysToRC<=3){
    var nextM=c.months[c.nextMonthIdx];
    var nfmt=fmtSegs(c.ranges[c.nextMonthIdx]);
    alertHtml='<div class="alert-box">&#x26A0;&#xFE0F; ראש חודש <strong>'+nextM.hmn+' '+hYearStr(nextM.hy)+'</strong> מתחיל בעוד <strong>'+c.daysToRC+'</strong> ימים — הלימוד יהיה פרק <strong>'+c.pd.p+'</strong> פסוקים <strong>'+nfmt.d+'</strong></div>';
  }

  var nbDays=daysToNextBD(c.nbGreg,today);

  var html='<div class="result-box">'+
    '<div class="main-msg">הלימוד בראש חודש <strong>'+curMonth.hmn+' '+hYearStr(curMonth.hy)+'</strong>:<br>פרק <strong>'+gem(c.pd.p)+'</strong> — פסוקים <strong>'+fmt.d+'</strong></div>'+
    '<div class="sub-msg">גיל: '+c.age+' | חלק '+( c.idx+1)+'/'+c.numM+' | '+(c.numM===13?'שנה מעוברת — מחזור לימוד של 13 חודשים':'שנה רגילה — מחזור לימוד של 12 חודשים')+(nbDays!==null?' | יום הולדת הבא: '+formatCountdown(nbDays):'')+' </div>'+
    alertHtml+
    '<div class="action-btns">'+
      '<button class="btn-gold" onclick="openViewer('+c.pd.p+','+(c.idx+1)+','+c.numM+','+vFrom+','+vTo+',\''+curMonth.hmn+' '+hYearStr(curMonth.hy)+'\',\''+fmt.d+'\')">&#x1F4D6; קרא לימוד נוכחי</button>'+
      '<button class="btn-outline" id="toggle-table-btn" onclick="toggleTable()">&#x1F4C5; טבלה מלאה</button>'+
    '</div>'+
    '<div class="collapse-content" id="full-table-wrap"></div>'+
  '</div>';

  res.innerHTML=html;

  // store for table
  window._lastCalc={c,bm,bd,by};
  window._lastCalcC=c;
}

async function buildTable(wrap,c){
  var table=document.createElement('table');
  table.className='study-table';
  var thead=document.createElement('tr');
  thead.innerHTML='<th>\u05d7\u05dc\u05e7</th><th>\u05d7\u05d5\u05d3\u05e9</th><th>\u05e8\u05d0\u05e9 \u05d7\u05d5\u05d3\u05e9</th><th>\u05e4\u05e1\u05d5\u05e7\u05d9\u05dd</th><th></th>';
  table.appendChild(thead);
  for(var ti=0;ti<c.months.length;ti++){
    var sm=c.months[ti],fmt=fmtSegs(c.ranges[ti]);
    var g=await h2g(sm.hy,sm.hm,1);
    var gstr=g&&g.gy?new Date(g.gy,g.gm-1,g.gd).toLocaleDateString('he-IL'):'--';
    var segs=c.ranges[ti];var vf=segs[0][0],vt=segs[segs.length-1][1];
    var isCur=(ti===c.idx);
    var tr=document.createElement('tr');
    if(isCur)tr.className='cur';
    var monthLabel=sm.hmn+' '+hYearStr(sm.hy);
    tr.innerHTML='<td>'+(ti+1)+'</td><td>'+monthLabel+'</td>'+
      '<td style="direction:ltr;text-align:left">'+gstr+'</td>'+
      '<td>'+fmt.d+' <small style="color:#999">('+fmt.n+')</small></td>'+
      '<td>'+
        '<button class="read-btn" data-p="'+c.pd.p+'" data-part="'+(ti+1)+'" data-total="'+c.numM+'" data-vf="'+vf+'" data-vt="'+vt+'" data-month="'+monthLabel+'" data-verses="'+fmt.d+'">\u05e7\u05e8\u05d0</button> '+
        '<button class="read-btn" style="background:#f0f0f0;color:#444;border:1px solid #ccc;font-size:.7rem" data-copyp="'+c.pd.p+'" data-copypart="'+(ti+1)+'" data-copytotal="'+c.numM+'" data-copyvf="'+vf+'" data-copyvt="'+vt+'">\u05d4\u05e2\u05ea\u05e7 \u05dc\u05d9\u05e0\u05e7 \u05dc\u05dc\u05d9\u05de\u05d5\u05d3 \u05d6\u05d4</button>'+
      '</td>';
    (function(row,cp,cpart,ctotal,cvf,cvt,cmonth,cverses){
      var readBtn=row.querySelector('[data-p]');
      var copyBtn=row.querySelector('[data-copyp]');
      if(readBtn)readBtn.addEventListener('click',function(){openViewer(cp,cpart,ctotal,cvf,cvt,cmonth,cverses);_currentViewerCalc=c||null;});
      if(copyBtn)copyBtn.addEventListener('click',function(){copyTableLink(cp,cpart,ctotal,cvf,cvt);});
    })(tr,c.pd.p,ti+1,c.numM,vf,vt,monthLabel,fmt.d);
    table.appendChild(tr);
  }
  wrap.innerHTML='';
  wrap.appendChild(table);
}

function copyTableLink(p,part,total,vf,vt){
  var url=window.location.href.split('#')[0]+'#'+p+'/'+part+'-'+total+'/'+vf+'-'+vt;
  navigator.clipboard.writeText(url).then(function(){alert('הלינק הועתק!');});
}

function getChapters(){try{return JSON.parse(localStorage.getItem('tehillim_chapters')||'[]');}catch(e){return[];}}
function saveChapters(arr){localStorage.setItem('tehillim_chapters',JSON.stringify(arr));}

function toggleAddForm(){var f=document.getElementById('add-form');f.style.display=f.style.display==='none'?'block':'none';}
function toggleAddDateType(){
  var v=document.getElementById('af-dtype').value;
  document.getElementById('af-greg-row').style.display=v==='greg'?'flex':'none';
  document.getElementById('af-heb-row').style.display=v==='heb'?'flex':'none';
}

async function saveChapter(){
  var name=document.getElementById('af-name').value.trim();
  if(!name){alert('הזן שם');return;}
  var dtype=document.getElementById('af-dtype').value;
  var bm,bd,by;
  if(dtype==='greg'){
    var gv=document.getElementById('af-greg').value;
    if(!gv){alert('הזן תאריך');return;}
    var hb=await g2h(new Date(gv));
    if(!hb||hb.error){alert('שגיאה בהמרה');return;}
    bm=hb.hm;bd=hb.hd;by=hb.hy;
  }else{
    bd=parseInt(document.getElementById('af-hd').value);
    bm=document.getElementById('af-hm').value;
    by=parseInt(document.getElementById('af-hy').value);
  }
  if(bm==='Shvat')bm="Sh'vat";
  var alert_=document.getElementById('af-alert').checked;
  var chs=getChapters();
  chs.push({id:Date.now(),name,bm,bd,by,alert:alert_});
  saveChapters(chs);
  toggleAddForm();
  document.getElementById('af-name').value='';
  renderPersonal();
}

function addRabbi(){
  var chs=getChapters();
  if(chs.find(function(c){return c.name==='הרבי';})){alert('הרבי כבר קיים ברשימה');return;}
  g2h(new Date('1902-04-18')).then(function(hb){
    var bm=hb.hm,bd=hb.hd,by=hb.hy;
    if(bm==='Shvat')bm="Sh'vat";
    chs.push({id:Date.now(),name:'הרבי',bm,bd,by,alert:false});
    saveChapters(chs);renderPersonal();
  });
}

var _editId=null;
function editChapter(id){
  var chs=getChapters();
  var ch=chs.find(function(c){return c.id===id;});
  if(!ch)return;
  _editId=id;
  document.getElementById('em-name').value=ch.name;
  document.getElementById('em-alert').checked=!!ch.alert;
  // set date fields - we have heb date stored
  document.getElementById('em-dtype').value='heb';
  toggleEditDateType();
  document.getElementById('em-hd').value=ch.bd;
  // set month select
  var hms=document.getElementById('em-hm');
  for(var i=0;i<hms.options.length;i++){if(hms.options[i].value===ch.bm){hms.selectedIndex=i;break;}}
  document.getElementById('em-hy').value=ch.by;
  document.getElementById('edit-overlay').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeEditModal(){
  document.getElementById('edit-overlay').style.display='none';
  document.body.style.overflow='';
  _editId=null;
}
function toggleEditDateType(){
  var v=document.getElementById('em-dtype').value;
  document.getElementById('em-greg-row').style.display=v==='greg'?'block':'none';
  document.getElementById('em-heb-row').style.display=v==='heb'?'flex':'none';
}
async function saveEditModal(){
  if(!_editId)return;
  var chs=getChapters();
  var ch=chs.find(function(c){return c.id===_editId;});
  if(!ch)return;
  var name=document.getElementById('em-name').value.trim();
  if(!name){alert('הזן שם');return;}
  ch.name=name;
  ch.alert=document.getElementById('em-alert').checked;
  var dtype=document.getElementById('em-dtype').value;
  if(dtype==='greg'){
    var gv=document.getElementById('em-greg').value;
    if(gv){
      var hb=await g2h(new Date(gv));
      if(hb&&!hb.error){ch.bm=hb.hm;ch.bd=hb.hd;ch.by=hb.hy;}
    }
  } else {
    ch.bd=parseInt(document.getElementById('em-hd').value);
    ch.bm=document.getElementById('em-hm').value;
    ch.by=parseInt(document.getElementById('em-hy').value);
  }
  if(ch.bm==='Shvat')ch.bm="Sh'vat";
  saveChapters(chs);
  closeEditModal();
  renderPersonal();
}

function deleteChapter(id){
  if(!confirm('למחוק?'))return;
  saveChapters(getChapters().filter(function(c){return c.id!==id;}));
  renderPersonal();
}

    var c=await calcForBirth(ch.bm,ch.bd,ch.by,today);

    var id=ch.id;
    var nbHebStr='';
    if(c.nbGreg){
      try{
        var nbH=await g2h(c.nbGreg);
        if(nbH&&nbH.hd)nbHebStr=gem(nbH.hd)+' '+hmn(nbH.hm)+' '+hYearStr(nbH.hy);

    }
    var bdLine='';

      if(nbHebStr)bdLine+=' \u2014 '+nbHebStr;

      '<div class="ch-name">'+ch.name+(ch.alert?' <span class="tag">\u05d4\u05ea\u05e8\u05d0\u05d4</span>':'')+' </div>'+
      '<div class="ch-meta">'+
        '\u05e4\u05e8\u05e7 '+gem(c.pd.p)+' (\u05d2\u05d9\u05dc '+c.age+') &nbsp;|&nbsp; '+
        '\u05e8\u05d0\u05e9 \u05d7\u05d5\u05d3\u05e9 <strong>'+curM.hmn+'</strong> \u2014 \u05e4\u05e1\u05d5\u05e7\u05d9\u05dd '+fmt.d+'<br>'+
        (bdLine?bdLine+' &nbsp;|&nbsp; ':'')+'מחזור לימוד של '+c.numM+' חודשים'+

      '<div class="ch-actions-primary">'+

async function openPersonalTable(id){
  var wrap=document.getElementById('ptable-'+id);
  if(wrap.classList.contains('open')){wrap.classList.remove('open');return;}
  wrap.classList.add('open');
  if(wrap.dataset.built)return;
  wrap.dataset.built='1';
  var c=window._chCalc[id];
  if(!c)return;
  buildTable(wrap,c);
}

// Drag & Drop
var dragSrcId=null;
function dragStart(e,id){dragSrcId=id;e.currentTarget.classList.add('dragging');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcId===targetId)return;
  var chs=getChapters();
  var si=chs.findIndex(function(c){return c.id===dragSrcId;});
  var ti=chs.findIndex(function(c){return c.id===targetId;});
  var item=chs.splice(si,1)[0];
  chs.splice(ti,0,item);
  saveChapters(chs);
  renderPersonal();
}

// Single fetch for all chapters - loaded once and cached globally
var _allRaboteinData=null;
var _allRaboteinLoading=null;

async function getAllRabotein(){
  if(_allRaboteinData)return _allRaboteinData;
  if(_allRaboteinLoading)return _allRaboteinLoading;
  _allRaboteinLoading=fetch('https://shnotik770-netizen.github.io/tehilim/psalms/all-rabotein.json')
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){_allRaboteinData=d||{};_allRaboteinLoading=null;return _allRaboteinData;})
    .catch(function(){_allRaboteinData={};_allRaboteinLoading=null;return {};});
  return _allRaboteinLoading;
}

async function loadChapterCommentaries(chapter){
  // reset buttons and blocks
  ['raboteinu','geula_mashiach','chassidut_meuvad'].forEach(function(k){
    var btn=document.getElementById('btn-'+k);
    var block=document.getElementById('chcomm-'+k);
    if(btn)btn.style.display='none';
    if(block)block.style.display='none';
  });
  document.getElementById('chapter-comm-bar').style.display='none';

  var allData=await getAllRabotein();
  // chapter key is string
  var chapterEntry=allData[String(chapter)];
  if(!chapterEntry)return;
  // JSON structure: { "commentaries": { "raboteinu": {...}, ... } }
  var chapterData=chapterEntry.commentaries||chapterEntry;

  var KEY_MAP={
    'raboteinu':'raboteinu',
    'chassidut_meuvad':'chassidut_meuvad',
    'geula_mashiach':'geula_mashiach'
  };
  var anyVisible=false;
  Object.keys(KEY_MAP).forEach(function(jsonKey){
    var uiKey=KEY_MAP[jsonKey];
    var data=chapterData[jsonKey];
    var text=data&&typeof data==='object'?data.text:data;
    var sources=data&&typeof data==='object'?data.sources||'':'';
    if(!text||!text.trim())return;
    var btn=document.getElementById('btn-'+uiKey);
    var textEl=document.getElementById('chcomm-'+uiKey+'-text');
    var srcEl=document.getElementById('chcomm-'+uiKey+'-sources');
    if(btn)btn.style.display='inline-block';
    if(textEl)textEl.textContent=text;
    if(srcEl)srcEl.textContent=sources;
    anyVisible=true;
  });
  if(anyVisible)document.getElementById('chapter-comm-bar').style.display='flex';
}

function openViewer(p,part,total,vf,vt,monthLabel,versesLabel,rawSegs){
  var hash='#'+p+'/'+part+'-'+total+'/'+vf+'-'+vt;
  var url=window.location.href.split('#')[0]+hash;
  document.getElementById('vwr-title').textContent='תהלים פרק '+gem(p)+' — פסוקים '+versesLabel+' — '+monthLabel;
  document.getElementById('vwr-link').textContent=url;
  window._vwrUrl=url;
  // Build segments for cross-chapter support
  if(rawSegs&&rawSegs.length){
    window._vwrSegs=rawSegs;
  } else {
    // Simple single range - check if it wraps around chapter
    var totalV=PSALM_DATA[p-1].v;
    if(vf<=vt){
      window._vwrSegs=[{ch:p,vf:vf,vt:vt}];
    } else {
      // wraps: vf to end, then 1 to vt
      window._vwrSegs=[{ch:p,vf:vf,vt:totalV},{ch:p,vf:1,vt:vt}];
    }
  }
  viewerFontSize=100;
  document.getElementById('font-size-display').textContent='100%';
  var vp=document.getElementById('viewer-panel');
  if(vp){vp.style.fontSize='';vp.style.fontFamily="'Keter YG','Frank Ruhl Libre',serif";}
  document.getElementById('viewer-overlay').style.display='block';
  document.body.style.overflow='hidden';
  _currentViewerChapter=p;
  _currentViewerCalc=null; // will be set by caller if available
  _fullChapterOpen=false;
  var fcWrap=document.getElementById('full-chapter-wrap');
  if(fcWrap)fcWrap.style.display='none';
  var fcBtn=document.getElementById('btn-full-chapter');
  if(fcBtn)fcBtn.classList.remove('active');
  loadViewerContent(p,vf,vt);
  loadChapterCommentaries(p);
}
function closeViewer(){document.getElementById('viewer-overlay').style.display='none';document.body.style.overflow='';window._vwrSegs=null;}

var _fullChapterOpen=false;
var _currentViewerChapter=null;

async function loadFullChapterContent(chapter,calc){
  var wrap=document.getElementById('full-chapter-content');
  wrap.innerHTML='<div class="viewer-loading">&#x23F3; טוען פרק מלא...</div>';
  var pd=PSALM_DATA[chapter-1];
  var totalV=pd.v;
  try{
    // Fetch text
    var ref='Psalms '+chapter+':1-'+totalV;
    var textUrl='https://www.sefaria.org/api/v3/texts/'+encodeURIComponent(ref)+'?lang=he&vhe='+encodeURIComponent('Tanach with Nikkud');
    // Fetch all commentaries for chapter
    var linkUrl='https://www.sefaria.org/api/links/Psalms.'+chapter+'.1-'+totalV+'?with_text=1&lang=he';
    var [tr,lr]=await Promise.all([fetch(textUrl),fetch(linkUrl)]);
    var td=await tr.json(), ld=await lr.json();

    // Parse verses
    var heArr=[];
    if(td.versions&&td.versions[0]){var tv=td.versions[0].text;heArr=Array.isArray(tv)?tv:[tv];}
    if(!heArr.length&&td.versions&&td.versions.length>1){var tv2=td.versions[1].text;heArr=Array.isArray(tv2)?tv2:[tv2];}

    // Parse commentaries per verse
    var commByVerse={};
    for(var vi=1;vi<=totalV;vi++)commByVerse[vi]={rashi:[],'metzudot-david':[],'metzudot-zion':[],radak:[],ibnezra:[]};
    if(Array.isArray(ld)){ld.forEach(function(lnk){
      var cat=lnk.collectiveTitle&&lnk.collectiveTitle.en,key=COMM_MAP[cat];
      if(!key||!lnk.he)return;
      var am=lnk.anchorRef&&lnk.anchorRef.match(/:(\d+)/),vn=am?parseInt(am[1]):1;
      if(commByVerse[vn]&&commByVerse[vn][key]!==undefined)commByVerse[vn][key].push(lnk.he);
    });}

    // Build HTML — one block per verse with all active commentaries
    var html='';
    heArr.forEach(function(txt,i){
      var vnum=i+1;
      var comm=commByVerse[vnum]||{};
      html+='<div class="pasuk-block">';
      html+='<div class="pasuk-num">פסוק '+gem(vnum)+'</div>';
      html+='<div class="pasuk-text">'+processVerseText(txt)+'</div>';
      html+='<div>';
      ['rashi','metzudot-david','metzudot-zion','radak','ibnezra'].forEach(function(key){
        var txts=comm[key]||[];if(!txts.length)return;
        if(!activeComms[key])return; // respect toggle state
        html+='<div class="comm-item '+key+'">'+
          '<div class="comm-label '+key+'">'+COMM_LBL[key]+'</div>'+
          txts.map(function(t){return'<div class="comm-text">'+stripH(t)+'</div>';}).join('')+
          '</div>';
      });
      html+='</div></div>';
    });

    // Distribution table
    var tableHtml='';
    if(calc){
      tableHtml+='<hr style="margin:1rem 0">';
      tableHtml+='<div style="font-weight:700;color:var(--blue);margin-bottom:.5rem;font-size:.88rem">חלוקת פסוקים לפי חודשים:</div>';
      tableHtml+='<table class="study-table"><tr><th>חלק</th><th>חודש</th><th>פסוקים</th></tr>';
      for(var ti=0;ti<calc.months.length;ti++){
        var sm=calc.months[ti];
        var fmt=fmtSegs(calc.ranges[ti]);
        var isCur=(ti===calc.idx);
        tableHtml+='<tr'+(isCur?' class="cur"':'')+'>'+
          '<td>'+(ti+1)+'</td>'+
          '<td>'+sm.hmn+' '+hYearStr(sm.hy)+'</td>'+
          '<td>'+fmt.d+'</td></tr>';
      }
      tableHtml+='</table>';
    }

    wrap.innerHTML=html+tableHtml||'<div class="err">לא נמצאו פסוקים</div>';
  }catch(e){
    wrap.innerHTML='<div class="err">שגיאה בטעינה: '+e.message+'</div>';
  }
}
function copyVwrLink(){navigator.clipboard.writeText(window._vwrUrl||'').then(function(){alert('\u05d4\u05dc\u05d9\u05e0\u05e7 \u05d4\u05d5\u05e2\u05ea\u05e7!');});}


function openViewerWithCalc(p,part,total,vf,vt,monthLabel,versesLabel,calc){
  openViewer(p,part,total,vf,vt,monthLabel,versesLabel);
  _currentViewerCalc=calc||null;
}
function stripH(s){return s?s.replace(/<[^>]+>/g,''):''}
function stripTeamim(s){
  if(!s)return s;
  // Remove Hebrew cantillation marks (teamim) U+0591-U+05AF, U+05C4, U+05C5
  // Keep nikkud (U+05B0-U+05BC, U+05C1-U+05C3, U+05C7) and letters
  return s.replace(/[֑-ׅ֯ׄ]/g,'');
}
function processVerseText(s){return stripTeamim(stripH(s));}

async function loadViewerContent(chapter,vf,vt){
  var el=document.getElementById('vwr-content');
  el.innerHTML='<div class="viewer-loading">&#x23F3; טוען מספריא...</div>';
  var cacheKey=chapter+':'+vf+'-'+vt;
  var data=sefC[cacheKey];
  if(!data){
    try{
      // Build segments list from PSALM_DATA for cross-chapter support
      var totalV=PSALM_DATA[chapter-1].v;
      // collect all (chap, fromV, toV) segments by expanding segs
      // segs is passed via openViewer but we only have vf,vt here
      // We use the stored _vwrSegs set by openViewer
      var segments=window._vwrSegs||[{ch:chapter,vf:vf,vt:vt}];
      data={verses:[],comm:{}};
      // fetch each segment separately
      for(var si=0;si<segments.length;si++){
        var seg=segments[si];
        var segRef='Psalms '+seg.ch+':'+(seg.vf===seg.vt?seg.vf:seg.vf+'-'+seg.vt);
        var segUrl='https://www.sefaria.org/api/v3/texts/'+encodeURIComponent(segRef)+'?lang=he&vhe='+encodeURIComponent('Tanach with Nikkud');
        var segLinkUrl='https://www.sefaria.org/api/links/Psalms.'+seg.ch+'.'+seg.vf+(seg.vf===seg.vt?'':'-'+seg.vt)+'?with_text=1&lang=he';
        var [str,slr]=await Promise.all([fetch(segUrl),fetch(segLinkUrl)]);
        if(!str.ok){continue;}
        var std=await str.json(),sld=await slr.json();
        var heArr=[];
        if(std.versions&&std.versions[0]){var sv=std.versions[0].text;heArr=Array.isArray(sv)?sv:[sv];}
        // fallback: if no versions with vhe, try without
        if(!heArr.length&&std.versions&&std.versions.length){
          var sv2=std.versions[0].text;heArr=Array.isArray(sv2)?sv2:[sv2];
        }
        for(var vi=0;vi<heArr.length;vi++){
          var vnum=seg.vf+vi;
          var label='פסוק '+gem(vnum)+(segments.length>1?' ('+gem(seg.ch)+')':'');
          data.verses.push({num:vnum,text:heArr[vi]||'',label:label});
          data.comm[seg.ch+':'+vnum]={rashi:[],'metzudot-david':[],'metzudot-zion':[],radak:[],ibnezra:[]};
        }
        if(Array.isArray(sld)){sld.forEach(function(lnk){
          var cat=lnk.collectiveTitle&&lnk.collectiveTitle.en,key=COMM_MAP[cat];
          if(!key||!lnk.he)return;
          var am=lnk.anchorRef&&lnk.anchorRef.match(/:(\d+)/),vn2=am?parseInt(am[1]):seg.vf;
          var ck=seg.ch+':'+vn2;
          if(data.comm[ck]&&data.comm[ck][key]!==undefined)data.comm[ck][key].push(lnk.he);
        });}
      }
      sefC[cacheKey]=data;
    }catch(e){el.innerHTML='<div class="err">שגיאה בטעינה מספריא</div>';return;}
  }
  var html='';
  data.verses.forEach(function(v){
    var commKey=v.commKey||(v.ch?v.ch+':'+v.num:Object.keys(data.comm).find(function(k){return k.endsWith(':'+v.num);})||v.num);
    var comm=data.comm[commKey]||data.comm[v.num]||{rashi:[],'metzudot-david':[],'metzudot-zion':[],radak:[],ibnezra:[]};
    html+='<div class="pasuk-block"><div class="pasuk-num">'+(v.label||'פסוק '+gem(v.num))+'</div><div class="pasuk-text">'+processVerseText(v.text)+'</div><div>';
    ['rashi','metzudot-david','metzudot-zion','radak','ibnezra'].forEach(function(key){
      var txts=comm[key]||[];if(!txts.length)return;
      var cssClass=key;
      html+='<div class="comm-item '+cssClass+'" style="display:'+(activeComms[key]?'block':'none')+'">'+
        '<div class="comm-label '+cssClass+'">'+COMM_LBL[key]+'</div>'+
        txts.map(function(t){return'<div class="comm-text">'+stripH(t)+'</div>';}).join('')+
        '</div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html||'<div class="err">לא נמצאו פסוקים</div>';
}

function showSection(s){
  document.querySelectorAll('.section').forEach(function(el){el.classList.remove('active');});
  document.getElementById('sec-'+s).classList.add('active');
  document.querySelectorAll('.nav-links button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('nav-'+s).classList.add('active');
  if(s==='personal')renderPersonal();
}

// Hash routing for direct links
async function loadFromHash(){
  var hash=window.location.hash.replace('#','');
  if(!hash)return;
  var parts=hash.split('/');
  if(parts.length<3)return;
  var ch=parseInt(parts[0]),pt=parts[1].split('-'),vp=parts[2].split('-');
  var pn=parseInt(pt[0]),tot=parseInt(pt[1]||'0'),vf=parseInt(vp[0]),vt=parseInt(vp[1]||vp[0]);
  if(isNaN(ch)||isNaN(vf))return;
  openViewer(ch,pn,tot,vf,vt,'','פסוקים '+gem(vf)+(vf===vt?'':'\u2013'+gem(vt)));
}

window.onload=async function(){
  // Hebrew year letters live preview
  var hy=document.getElementById('heb-year');
  if(hy){hy.addEventListener('input',function(){
    var n=parseInt(this.value);
    var el=document.getElementById('heb-year-letters');
    if(el)el.textContent=n>=5000&&n<=6000?hYearStr(n):'';
  });}
  await loadFromHash();
  renderPersonal();
};
